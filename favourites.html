<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Phoenix · Favourites</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* نفس متغيرات وتصميم السوق */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root {
      --bg: #f9fafc; --surface: #ffffff; --text-primary: #1e1e2f; --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c; --accent-2: #ff6b2b; --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border: #eaeef2; --shadow: 0 20px 30px -10px rgba(0,0,0,0.05); --glow: rgba(255,110,64,0.4);
      --navbar-bg: rgba(255,255,255,0.8); --footer-bg: #1e1e2f; --footer-text: #f0f0fa;
    }
    body.dark {
      --bg: #12121a; --surface: #1e1e2a; --text-primary: #f0f0fa; --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e; --accent-2: #ff7b3f; --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border: #333344; --shadow: 0 20px 30px -10px rgba(0,0,0,0.7); --glow: rgba(255,140,80,0.6);
      --navbar-bg: rgba(30,30,42,0.9); --footer-bg: #0b0b12; --footer-text: #ddddff;
    }
    body { background: var(--bg); color: var(--text-primary); line-height: 1.5; transition: 0.3s; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; width: 100%; flex: 1; }

    /* Navbar (مطابقة) */
    nav {
      position: sticky; top: 0; backdrop-filter: blur(12px); background: var(--navbar-bg);
      border-bottom: 1px solid var(--border); z-index: 100; padding: 0.5rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-area { display: flex; align-items: center; gap: 0.3rem; }
    .logo-area img { height: 40px; width: auto; border-radius: 8px; }
    .logo-text h2 { font-size: 1.2rem; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-size: 0.7rem; color: var(--text-secondary); display: block; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { text-decoration: none; color: var(--text-primary); font-weight: 500; }
    .nav-links a:hover { color: var(--accent-1); }
    .nav-right { display: flex; align-items: center; gap: 0.8rem; }
    .nav-icon { font-size: 1.2rem; color: var(--text-primary); cursor: pointer; }
    .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; }
    .profile-badge { background: var(--surface); border-radius: 50%; width: 40px; height: 40px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; color: var(--text-primary); font-weight: 600; }
    .logout-btn { background: transparent; border: 1px solid var(--accent-1); color: var(--accent-1); padding: 0.3rem 0.9rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .hamburger { display: none; font-size: 1.5rem; cursor: pointer; }
    .sidebar { position: fixed; top: 0; left: -100%; width: 250px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1rem; transition: left 0.3s; z-index: 200; }
    .sidebar.open { left: 0; }
    .sidebar .close-btn { text-align: right; margin-bottom: 2rem; font-size: 1.5rem; cursor: pointer; }
    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 1.2rem; }
    .sidebar a, .sidebar button { text-decoration: none; color: var(--text-primary); font-weight: 500; font-size: 1.1rem; display: flex; align-items: center; gap: 0.8rem; background: none; border: none; width: 100%; text-align: left; cursor: pointer; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .overlay.active { display: block; }

    /* Grid */
    .page-header { margin: 2rem 0 1rem; text-align: center; }
    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin: 2rem 0; }
    .product-card { background: var(--surface); border-radius: 20px; padding: 1rem; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; position: relative; }
    .product-card:hover { transform: translateY(-4px); border-color: var(--accent-1); }
    .product-img { width: 100%; height: 150px; border-radius: 14px; margin-bottom: 0.8rem; overflow: hidden; background: #f0f0f0; display: flex; align-items: center; justify-content: center; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-title { font-size: 1rem; font-weight: 700; }
    .product-city { font-size: 0.8rem; color: var(--text-secondary); }
    .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
    .product-value { font-weight: 700; color: var(--accent-2); }
    .remove-fav { background: none; border: none; color: var(--accent-1); font-size: 1.2rem; cursor: pointer; }
    .badge { position: absolute; top: 0.8rem; left: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 30px; font-size: 0.7rem; font-weight: 600; z-index: 2; }
    .badge.free { background: #2ecc71; color: white; }
    .badge.sale { background: var(--accent-1); color: white; }

    .simple-footer { background: var(--footer-bg); color: var(--footer-text); text-align: center; padding: 1rem; margin-top: 2rem; border-top: 1px solid var(--border); }
    .simple-footer a { color: var(--footer-text); text-decoration: none; }
    .notification-badge, .message-badge { display: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links, .nav-right .theme-toggle, .nav-right .notification-wrapper, .nav-right .message-wrapper, .nav-right .profile-badge, .nav-right .logout-btn { display: none; }
      .hamburger { display: block; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo-area">
    <img src="photo_2026-02-17_19-01-20.jpg" alt="Phoenix">
    <div class="logo-text"><h2>Phoenix</h2><span>donate & trade</span></div>
  </div>
  <div class="nav-links">
    <a href="dashboard.html">Home</a>
    <a href="market.html">Market</a>
    <a href="donate.html">Donate</a>
    <a href="sell.html">Sell</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
    <div class="notification-wrapper">
      <i class="fas fa-bell nav-icon" id="notificationBell"></i>
      <span class="notification-badge">0</span>
    </div>
    <div class="message-wrapper">
      <i class="fas fa-comment-dots nav-icon" id="messageIcon"></i>
      <span class="message-badge">0</span>
    </div>
    <div class="profile-badge" id="profileBadge">U</div>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    <span class="hamburger" id="hamburger">☰</span>
  </div>
</nav>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="close-btn" id="closeSidebar">✕</div>
  <ul>
    <li><a href="dashboard.html"><i class="fas fa-home"></i> Home</a></li>
    <li><a href="market.html"><i class="fas fa-store"></i> Market</a></li>
    <li><a href="donate.html"><i class="fas fa-hand-holding-heart"></i> Donate</a></li>
    <li><a href="sell.html"><i class="fas fa-tags"></i> Sell</a></li>
    <li><a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a></li>
    <li><button id="sidebarDarkMode"><i class="fas fa-moon"></i> Dark Mode</button></li>
    <li><button id="sidebarLogout"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
  </ul>
</div>
<div class="overlay" id="overlay"></div>

<main class="container">
  <div class="page-header">
    <h1 style="font-size:2.2rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Your Favourites</h1>
    <p style="color: var(--text-secondary);">Items you've saved for later</p>
  </div>
  <div id="favouritesGrid" class="product-grid"></div>
  <div id="emptyMessage" style="text-align:center; padding:3rem; color:var(--text-secondary); display:none;">
    <i class="far fa-heart" style="font-size:3rem; opacity:0.5;"></i>
    <p>No favourites yet. Explore the market and add some!</p>
    <a href="market.html" style="color:var(--accent-1);">Browse Market</a>
  </div>
</main>

<footer class="simple-footer">
  <div>© 2026 Phoenix · <a href="about.html">About</a></div>
</footer>

<script>
  (function() {
    // Dark mode
    const themeToggle = document.getElementById('themeToggle');
    const sidebarDarkBtn = document.getElementById('sidebarDarkMode');
    function toggleDark() {
      document.body.classList.toggle('dark');
      const icon = themeToggle.querySelector('i');
      if (document.body.classList.contains('dark')) {
        icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
        if (sidebarDarkBtn) sidebarDarkBtn.querySelector('i').className = 'fas fa-sun';
      } else {
        icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
        if (sidebarDarkBtn) sidebarDarkBtn.querySelector('i').className = 'fas fa-moon';
      }
    }
    themeToggle.addEventListener('click', toggleDark);
    if (sidebarDarkBtn) sidebarDarkBtn.addEventListener('click', toggleDark);

    // Sidebar & Logout
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    hamburger.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('active'); });
    document.getElementById('closeSidebar').addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });
    function logout() { if (confirm('Logout?')) { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; } }
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('sidebarLogout')?.addEventListener('click', logout);

    // ربط بـ chat
    document.getElementById('notificationBell').addEventListener('click', () => window.location.href = 'chat.html');
    document.getElementById('messageIcon').addEventListener('click', () => window.location.href = 'chat.html');

    // Profile
    const user = JSON.parse(localStorage.getItem('currentUser')) || { firstName: 'U' };
    document.getElementById('profileBadge').textContent = (user.firstName || 'U').charAt(0).toUpperCase();

    // عرض المفضلة
    const grid = document.getElementById('favouritesGrid');
    const emptyMsg = document.getElementById('emptyMessage');
    let favourites = JSON.parse(localStorage.getItem('favourites')) || [];

    function renderFavourites() {
      if (favourites.length === 0) {
        grid.innerHTML = '';
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';
      grid.innerHTML = favourites.map(p => {
        const isFree = p.type === 'free' || p.price === 0;
        return `
          <div class="product-card" data-id="${p.id}">
            <div class="badge ${isFree ? 'free' : 'sale'}">${isFree ? 'Free' : 'Sale'}</div>
            <div class="product-img">
              <img src="${p.img || 'https://via.placeholder.com/150'}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="product-title">${p.title}</div>
            <div class="product-city"><i class="fas fa-map-marker-alt"></i> ${p.city || 'Cairo'}</div>
            <div class="product-footer">
              <span class="product-value">${isFree ? 'Free' : p.price + ' EGP'}</span>
              <button class="remove-fav" data-id="${p.id}" title="Remove"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
        `;
      }).join('');

      // إضافة مستمعات
      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.remove-fav')) return;
          window.location.href = `product.html?id=${card.dataset.id}`;
        });
      });
      document.querySelectorAll('.remove-fav').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          favourites = favourites.filter(p => p.id !== id);
          localStorage.setItem('favourites', JSON.stringify(favourites));
          renderFavourites();
        });
      });
    }
    renderFavourites();
  })();
</script>
<script src="main.js"></script>
</body>
</html>
