<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Phoenix · Profile</title>
  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ========== GLOBAL VARIABLES & RESET ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root {
      --bg: #f9fafc; --surface: #ffffff; --text-primary: #1e1e2f; --text-secondary: #4a4a5e;
      --accent-1: #ff8a4c; --accent-2: #ff6b2b; --gradient: linear-gradient(135deg, #ff8a4c, #ff4d4d);
      --border: #eaeef2; --shadow: 0 20px 30px -10px rgba(0,0,0,0.05); --glow: rgba(255,110,64,0.4);
      --navbar-bg: rgba(255,255,255,0.8); --divider-color: #eaeef2;
    }
    body.dark {
      --bg: #12121a; --surface: #1e1e2a; --text-primary: #f0f0fa; --text-secondary: #b0b0c0;
      --accent-1: #ff9f6e; --accent-2: #ff7b3f; --gradient: linear-gradient(135deg, #ff9f6e, #ff5e5e);
      --border: #333344; --shadow: 0 20px 30px -10px rgba(0,0,0,0.7); --glow: rgba(255,140,80,0.6);
      --navbar-bg: rgba(30,30,42,0.9); --divider-color: #333344;
    }
    body {
      background: var(--bg); color: var(--text-primary); line-height: 1.5;
      transition: background 0.3s, color 0.2s; min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; width: 100%; flex: 1; }

    /* ===== NAVBAR (مُوحَّد مع Dropdowns) ===== */
    nav {
      position: sticky; top: 0; backdrop-filter: blur(12px); background: var(--navbar-bg);
      border-bottom: 1px solid var(--border); z-index: 100; padding: 0.5rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-area { display: flex; align-items: center; gap: 0.3rem; }
    .logo-area img { height: 40px; width: auto; border-radius: 8px; }
    .logo-text h2 { font-size: 1.2rem; font-weight: 700; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-text span { font-size: 0.7rem; color: var(--text-secondary); display: block; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-links a { text-decoration: none; color: var(--text-primary); font-weight: 500; transition: 0.2s; }
    .nav-links a:hover { color: var(--accent-1); }
    .nav-right { display: flex; align-items: center; gap: 0.8rem; position: relative; }
    .nav-icon { font-size: 1.2rem; color: var(--text-primary); cursor: pointer; transition: 0.2s; }
    .nav-icon:hover { color: var(--accent-1); }
    .theme-toggle { background: none; border: none; color: var(--text-primary); font-size: 1.2rem; cursor: pointer; }
    .profile-dropdown-wrapper { position: relative; }
    .profile-badge {
      display: flex; align-items: center; justify-content: center; background: var(--surface);
      border-radius: 50%; width: 40px; height: 40px; border: 1px solid var(--border);
      cursor: pointer; text-decoration: none; color: var(--text-primary); font-weight: 600;
    }
    .profile-menu {
      position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface);
      border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow);
      min-width: 160px; display: none; flex-direction: column; padding: 0.5rem 0;
    }
    .profile-menu.show { display: flex; }
    .profile-menu a {
      padding: 0.7rem 1.2rem; color: var(--text-primary); text-decoration: none;
      transition: 0.2s; display: flex; align-items: center; gap: 0.5rem;
    }
    .profile-menu a:hover { background: var(--bg); color: var(--accent-1); }
    .logout-btn {
      background: transparent; border: 1px solid var(--accent-1); color: var(--accent-1);
      padding: 0.3rem 0.9rem; border-radius: 40px; font-weight: 600; cursor: pointer;
    }
    .logout-btn:hover { background: var(--accent-1); color: white; box-shadow: 0 0 15px var(--glow); }
    .hamburger { display: none; font-size: 1.5rem; cursor: pointer; color: var(--text-primary); margin-left: 0.5rem; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: -100%; width: 250px; height: 100vh; background: var(--surface);
      border-right: 1px solid var(--border); padding: 2rem 1rem; transition: left 0.3s; z-index: 200;
    }
    .sidebar.open { left: 0; }
    .sidebar .close-btn { text-align: right; margin-bottom: 2rem; font-size: 1.5rem; cursor: pointer; }
    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 1.2rem; }
    .sidebar a, .sidebar button {
      text-decoration: none; color: var(--text-primary); font-weight: 500; font-size: 1.1rem;
      display: flex; align-items: center; gap: 0.8rem; background: none; border: none; width: 100%; cursor: pointer;
    }
    .sidebar a:hover, .sidebar button:hover { color: var(--accent-1); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 150; display: none; }
    .overlay.active { display: block; }

    /* Dropdowns (Notifications & Messages) */
    .notification-wrapper, .message-wrapper { position: relative; display: inline-flex; align-items: center; }
    .notification-badge, .message-badge { display: none; }
    .notification-dropdown, .message-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0; width: 360px; max-width: 90vw;
      background: var(--surface); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border: 1px solid var(--border); z-index: 1001; display: none; flex-direction: column; overflow: hidden;
    }
    .notification-dropdown.show, .message-dropdown.show { display: flex; }
    .dropdown-header { display: flex; justify-content: space-between; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
    .dropdown-header h3 { font-size: 1.1rem; }
    .mark-read-btn { background: none; border: none; color: var(--accent-1); font-size: 0.8rem; cursor: pointer; }
    .notifications-list, .messages-list { max-height: 320px; overflow-y: auto; }
    .notification-item, .message-item {
      display: flex; gap: 0.8rem; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.2s;
    }
    .notification-item:hover, .message-item:hover { background: var(--bg); }
    .notification-icon { font-size: 1.2rem; color: var(--accent-1); }
    .notification-content, .message-content { flex: 1; }
    .notification-title, .message-sender { font-weight: 600; font-size: 0.9rem; }
    .notification-desc, .message-preview { font-size: 0.8rem; color: var(--text-secondary); }
    .notification-time, .message-time { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .message-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-1); overflow: hidden; }
    .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .dropdown-footer { padding: 0.8rem; text-align: center; border-top: 1px solid var(--border); }
    .dropdown-footer a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
    .dropdown-footer a:hover { color: var(--accent-1); text-decoration: underline; }

    /* ===== Profile Header ===== */
    .profile-header {
      display: flex; align-items: center; gap: 1.5rem; margin: 2rem 0; flex-wrap: wrap;
      background: var(--surface); border-radius: 40px; padding: 1.8rem 2rem;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .avatar-section { position: relative; }
    .profile-avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent-1); overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; background: var(--bg); }
    .settings-icon-btn {
      position: absolute; bottom: 5px; right: 5px; background: var(--surface);
      border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center;
      justify-content: center; border: 1px solid var(--border); cursor: pointer;
      box-shadow: var(--shadow); color: var(--accent-1); transition: 0.2s;
    }
    .settings-icon-btn:hover { background: var(--accent-1); color: white; }
    .profile-info h1 { font-size: 2rem; font-weight: 700; }
    .profile-info .username { color: var(--text-secondary); margin: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .stats-row { display: flex; gap: 1rem; margin: 2rem 0; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border-radius: 24px; padding: 1.2rem 1.5rem; flex: 1 1 160px;
      text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent-2); }
    .stat-label { color: var(--text-secondary); font-size: 0.8rem; }

    /* ===== Tabs & Listings ===== */
    .listings-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;
      flex-wrap: wrap; gap: 1rem;
    }
    .listings-header h2 { font-size: 1.8rem; font-weight: 600; }
    .tabs-container { display: flex; gap: 0.2rem; border-bottom: 2px solid var(--border); }
    .tab-btn {
      background: none; border: none; padding: 0.6rem 1.5rem; font-size: 1rem; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: 0.2s; position: relative;
    }
    .tab-btn.active { color: var(--accent-1); font-weight: 600; }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
      background: var(--accent-1); border-radius: 2px 2px 0 0;
    }
    .tab-btn:hover { color: var(--accent-1); }
    .add-item-btn {
      background: var(--gradient); color: white; border: none; padding: 0.6rem 1.5rem;
      border-radius: 40px; font-weight: 600; cursor: pointer; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }

    .product-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;
      margin: 1.5rem 0;
    }
    .product-card {
      background: var(--surface); border-radius: 20px; padding: 1rem; border: 1px solid var(--border);
      transition: 0.2s; cursor: pointer; display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-4px); border-color: var(--accent-1); box-shadow: var(--shadow); }
    .product-img {
      width: 100%; height: 150px; border-radius: 14px; overflow: hidden;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      margin-bottom: 0.8rem;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-title { font-weight: 600; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-price { color: var(--accent-2); font-weight: 700; font-size: 1.1rem; margin-top: auto; }
    .product-meta { font-size: 0.7rem; color: var(--text-secondary); margin: 0.2rem 0; }

    .empty-state {
      text-align: center; padding: 3rem 2rem; background: var(--surface); border-radius: 30px;
      border: 1px dashed var(--border); box-shadow: var(--shadow);
    }
    .empty-state i { font-size: 3.5rem; color: var(--accent-1); margin-bottom: 1rem; opacity: 0.7; }

    /* Bottom Navigation (Mobile) */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
      backdrop-filter: blur(12px); border-top: 1px solid var(--border);
      display: none; justify-content: space-around; padding: 0.6rem; z-index: 90;
    }
    .bottom-nav-item {
      display: flex; flex-direction: column; align-items: center; color: var(--text-secondary);
      text-decoration: none; font-size: 0.7rem; transition: 0.2s;
    }
    .bottom-nav-item i { font-size: 1.3rem; margin-bottom: 2px; }
    .bottom-nav-item.active { color: var(--accent-1); }
    .bottom-nav-item:hover { color: var(--accent-1); }

    /* ===== MODAL (Edit Profile) ===== */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center;
      visibility: hidden; opacity: 0; transition: 0.2s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal-box {
      background: var(--surface); border-radius: 40px; padding: 2rem; max-width: 450px; width: 90%;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .modal-box h2 { font-size: 1.8rem; margin-bottom: 1.5rem; text-align: center; }
    .modal-avatar { text-align: center; margin-bottom: 1.5rem; position: relative; }
    .modal-avatar-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-1); }
    .modal-upload-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 50%;
      width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; position: absolute; bottom: 0; margin-left: -18px; left: 50%;
      transform: translateX(-50%); box-shadow: var(--shadow); color: var(--accent-1);
    }
    .modal-group { margin-bottom: 1.2rem; }
    .modal-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; color: var(--accent-1); }
    .modal-group input, .modal-group textarea {
      width: 100%; padding: 0.8rem 1rem; background: var(--bg); border: 1px solid var(--border);
      border-radius: 30px; font-size: 0.95rem; color: var(--text-primary);
    }
    .modal-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    .modal-btn {
      background: var(--gradient); color: white; border: none; padding: 0.7rem 2rem;
      border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .modal-btn.outline { background: transparent; border: 2px solid var(--accent-1); color: var(--accent-1); }

    /* ===== CHATBOT & FOOTER ===== */
    .chatbot { position: fixed; bottom: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; align-items: center; }
    .chat-circle {
      width: 56px; height: 56px; background: linear-gradient(145deg, #ff9f4a, #ff4d2e);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 0 15px rgba(255,80,40,0.8); animation: float-glow 2.2s infinite;
    }
    .chat-circle img { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.6); }
    @keyframes float-glow {
      0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); }
    }
    .chat-label { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); color: #ffaa66; font-size: 0.65rem; padding: 3px 8px; border-radius: 30px; margin-top: 6px; cursor: pointer; }
    .chat-box { position: absolute; bottom: 80px; right: 0; width: 90vw; max-width: 450px; height: 500px; background: rgba(255,255,255,0.75); backdrop-filter: blur(16px); border-radius: 28px; border: 1px solid rgba(255,255,255,0.3); display: none; flex-direction: column; overflow: hidden; }
    body.dark .chat-box { background: rgba(30,30,42,0.85); }
    .chat-box.show { display: flex; }
    .chat-header { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; }
    .chat-message { max-width: 85%; padding: 8px 14px; border-radius: 20px; background: var(--surface); margin-bottom: 8px; }
    .chat-message.bot { background: var(--gradient); color: white; }
    .chat-input-area { display: flex; padding: 10px; gap: 8px; border-top: 1px solid var(--border); }
    .chat-input-area textarea { flex: 1; background: var(--surface); border: none; border-radius: 40px; padding: 8px; }
    .chat-input-area button { background: var(--gradient); border: none; border-radius: 40px; padding: 0 18px; color: white; }

    .simple-footer {
      margin-top: 3rem; padding: 1.5rem; text-align: center; border-top: 1px solid var(--divider-color);
      color: var(--text-secondary); font-size: 0.9rem;
    }
    .simple-footer a { color: var(--accent-1); text-decoration: none; font-weight: 500; }
    .simple-footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links, .nav-right .theme-toggle, .nav-right .notification-wrapper, .nav-right .message-wrapper, .nav-right .profile-dropdown-wrapper, .nav-right .logout-btn, #settingsIcon { display: none; }
      .hamburger { display: block; }
      .bottom-nav { display: flex; }
      body { padding-bottom: 70px; }
      .chatbot { bottom: 80px; }
      .listings-header { flex-direction: column; align-items: flex-start; }
      .tabs-container { overflow-x: auto; width: 100%; padding-bottom: 4px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 769px) {
      #settingsIcon { display: inline-block; }
    }
    @media (max-width: 480px) {
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <img src="" alt="Avatar" id="modalAvatarImg" class="modal-avatar-img">

      <textarea id="editBio" rows="2" placeholder="Tell us about yourself..."></textarea>
    </div>

      <button class="modal-btn" id="saveProfileBtn">Save Changes</button>
      <button class="modal-btn outline" id="cancelProfileBtn">Cancel</button>
    </div>
  </div>

  <div class="chat-circle" id="chatIcon"><img src="photo_2026-02-17_19-01-20.jpg" alt="AI" onerror="this.src='data:image/svg+xml,...'"></div>
  <span class="chat-label" id="chatLabel">Ask AI</span>
  <div class="chat-box" id="chatBox">
    <div class="chat-header"><h4><i class="fas fa-feather-alt"></i> Phoenix AI</h4><button class="close-chat" id="closeChatBtn">✕</button></div>
    <div class="chat-messages" id="chatMessages"><div class="chat-message bot">👋 Hi! How can I help?</div></div>
    <div class="chat-input-area"><textarea id="chatInput" placeholder="Type..."></textarea><button id="sendChat">Send</button></div>
  </div>
</div>

<footer class="simple-footer">
  Copyright © 2026 Phoenix — <a href="about.html">About</a>
</footer>

<script>
  (function(){
    'use strict';

    // ---------- بيانات المستخدم ----------
    let user = JSON.parse(localStorage.getItem('currentUser')) || { firstName:'User', email:'user@phoenix.com' };
    if (!localStorage.getItem('currentUser')) window.location.href = 'sign.html';
    const displayName = `${user.firstName || ''} ${user.lastName || ''}`.trim() || user.email?.split('@')[0] || 'User';
    document.getElementById('profileBadge').textContent = displayName.charAt(0).toUpperCase();

    // ---------- دوال مساعدة ----------
    function getUserProducts() { return JSON.parse(localStorage.getItem('userProducts') || '[]'); }
    function getFavorites() { return JSON.parse(localStorage.getItem('favourites') || '[]'); }

    let currentTab = 'sells';

    function renderProfileUI() {
      const main = document.getElementById('mainContent');
      const avatarSrc = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=ff8a4c&color=fff&size=100`;
      const products = getUserProducts();
      const activeCount = products.filter(p => p.status === 'active').length;
      const soldCount = products.filter(p => p.status === 'sold').length;

      main.innerHTML = `
        <div class="profile-header">
          <div class="avatar-section">
            <div class="profile-avatar"><img src="${avatarSrc}" alt="Avatar" id="profileAvatarImg"></div>
            <div class="settings-icon-btn" id="openSettingsModalBtn"><i class="fas fa-cog"></i></div>
          </div>
          <div class="profile-info">
            <h1>${displayName}</h1>
            <div class="username"><i class="fas fa-map-marker-alt"></i> ${user.location || 'Cairo, Egypt'} <span>·</span> <i class="fas fa-calendar"></i> Member since 2025</div>
            <div><i class="fas fa-quote-left" style="color:var(--accent-1);"></i> ${user.bio || 'Passionate about sustainable trading.'}</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-value" id="statActive">${activeCount}</div><div class="stat-label">Active Listings</div></div>
          <div class="stat-card"><div class="stat-value" id="statTrades">${soldCount}</div><div class="stat-label">Successful Trades</div></div>
          <div class="stat-card"><div class="stat-value">0.0</div><div class="stat-label">Average Rating</div></div>
          <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Response Time</div></div>
        </div>
        <div class="listings-header">
          <h2>My Listings</h2>
          <div class="tabs-container">
            <button class="tab-btn ${currentTab==='sells'?'active':''}" data-tab="sells">Sells</button>
            <button class="tab-btn ${currentTab==='donations'?'active':''}" data-tab="donations">Donations</button>
            <button class="tab-btn ${currentTab==='favorites'?'active':''}" data-tab="favorites">Favorites</button>
          </div>
          <a href="sell.html" class="add-item-btn"><i class="fas fa-plus"></i> Add New</a>
        </div>
        <div id="listingsContainer"></div>
      `;
      document.getElementById('openSettingsModalBtn').addEventListener('click', openEditModal);
      document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { currentTab = btn.dataset.tab; renderProfileUI(); }));
      renderListings();
    }

    function renderListings() {
      const container = document.getElementById('listingsContainer');
      let items = [];
      if (currentTab === 'sells') items = getUserProducts().filter(p => p.type === 'sale');
      else if (currentTab === 'donations') items = getUserProducts().filter(p => p.type === 'donation' || p.type === 'free');
      else items = getFavorites();

      if (!items.length) {
        let msg = currentTab === 'sells' ? 'No items for sale yet.' : (currentTab === 'donations' ? 'No donations yet.' : 'No favorites yet.');
        container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><h3>${msg}</h3><a href="sell.html" class="add-item-btn">Add New</a></div>`;
        return;
      }
      container.innerHTML = `<div class="product-grid">` + items.map(p => `
        <div class="product-card" data-id="${p.id}">
          <div class="product-img">${p.image ? `<img src="${p.image}">` : `<i class="fas fa-box fa-2x" style="color:var(--accent-1)"></i>`}</div>
          <div class="product-title">${p.title}</div>
          <div class="product-meta">${p.status || 'active'} · ${p.views || 0} views</div>
          <div class="product-price">${p.price === 0 ? 'Free' : p.price + ' EGP'}</div>
        </div>
      `).join('') + `</div>`;
    }

    // ---------- Edit Profile Modal ----------
    const modal = document.getElementById('editProfileModal');
    const modalImg = document.getElementById('modalAvatarImg');
    const nameInp = document.getElementById('editName');
    const locInp = document.getElementById('editLocation');
    const bioInp = document.getElementById('editBio');
    let tempAvatar = null;

    function openEditModal() {
      modalImg.src = user.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=ff8a4c&color=fff&size=100`;
      nameInp.value = displayName;
      locInp.value = user.location || '';
      bioInp.value = user.bio || '';
      tempAvatar = user.avatar;
      modal.classList.add('active');
    }

    document.getElementById('modalUploadBtn').addEventListener('click', () => document.getElementById('modalFileInput').click());
    document.getElementById('modalFileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => { modalImg.src = ev.target.result; tempAvatar = ev.target.result; };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('saveProfileBtn').addEventListener('click', () => {
      const fullName = nameInp.value.trim();
      const nameParts = fullName.split(' ');
      user.firstName = nameParts[0] || user.firstName;
      user.lastName = nameParts.slice(1).join(' ') || '';
      user.location = locInp.value.trim();
      user.bio = bioInp.value.trim();
      if (tempAvatar) user.avatar = tempAvatar;
      localStorage.setItem('currentUser', JSON.stringify(user));
      modal.classList.remove('active');
      renderProfileUI();
    });
    document.getElementById('cancelProfileBtn').addEventListener('click', () => modal.classList.remove('active'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });

    // ---------- Dark Mode ----------
    const themeToggle = document.getElementById('themeToggle');
    const sidebarDarkBtn = document.getElementById('sidebarDarkMode');
    function toggleDark() {
      document.body.classList.toggle('dark');
      const icon = themeToggle.querySelector('i');
      icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
      if (sidebarDarkBtn) sidebarDarkBtn.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Dark Mode' : '<i class="fas fa-moon"></i> Dark Mode';
      localStorage.setItem('phoenix-theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', toggleDark);
    if (sidebarDarkBtn) sidebarDarkBtn.addEventListener('click', toggleDark);
    if (localStorage.getItem('phoenix-theme') === 'dark') { document.body.classList.add('dark'); themeToggle.querySelector('i').classList.add('fa-sun'); }

    // ---------- Sidebar & Logout ----------
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('active'); }
    function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('active'); }
    hamburger.addEventListener('click', openSidebar);
    document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);
    function logout(){ if(confirm('Logout?')){ localStorage.removeItem('currentUser'); window.location.href='index.html'; } }
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('sidebarLogout').addEventListener('click', logout);
    document.getElementById('desktopLogout').addEventListener('click', e => { e.preventDefault(); logout(); });

    // ---------- Dropdowns (Notifications & Messages) - مطابقة للمثال ----------
    let activeDropdown = null;
    const notifDropdown = document.createElement('div'); notifDropdown.className = 'notification-dropdown';
    notifDropdown.innerHTML = `<div class="dropdown-header"><h3>Notifications</h3><button class="mark-read-btn" id="markAllRead">Mark all as read</button></div><div class="notifications-list" id="notificationsList"></div><div class="dropdown-footer"><a href="#" id="viewAllNotificationsLink">View all</a></div>`;
    document.body.appendChild(notifDropdown);
    const msgDropdown = document.createElement('div'); msgDropdown.className = 'message-dropdown';
    msgDropdown.innerHTML = `<div class="dropdown-header"><h3>Messages</h3><button class="mark-read-btn" id="markAllMessagesRead">Mark all as read</button></div><div class="messages-list" id="messagesList"></div><div class="dropdown-footer"><a href="#" id="viewAllMessagesLink">View all</a></div>`;
    document.body.appendChild(msgDropdown);

    const notifications = [
      { id:1, type:'message', title:'New message', description:'Ahmed sent you a message', time:'2m ago', user:'Ahmed' },
      { id:2, type:'donation', title:'Donation request', description:'Laila wants your coat', time:'1h ago', user:'Laila' }
    ];
    const messages = [
      { id:1, sender:'Ahmed Hassan', avatar:'https://i.pravatar.cc/40?img=7', preview:'Hey, still available?', time:'2m ago', user:'Ahmed' },
      { id:2, sender:'Laila M.', avatar:'https://i.pravatar.cc/40?img=5', preview:'Thanks!', time:'1h ago', user:'Laila' }
    ];

    function renderDropdowns() {
      document.getElementById('notificationsList').innerHTML = notifications.map(n => `<div class="notification-item" data-user="${n.user}"><div class="notification-icon"><i class="fas fa-${n.type==='message'?'envelope':'heart'}"></i></div><div class="notification-content"><div class="notification-title">${n.title}</div><div class="notification-desc">${n.description}</div><div class="notification-time">${n.time}</div></div></div>`).join('');
      document.getElementById('messagesList').innerHTML = messages.map(m => `<div class="message-item" data-user="${m.user}"><div class="message-avatar"><img src="${m.avatar}"></div><div class="message-content"><div class="message-sender">${m.sender}</div><div class="message-preview">${m.preview}</div><div class="message-time">${m.time}</div></div></div>`).join('');
      document.querySelectorAll('.notification-item, .message-item').forEach(el => el.addEventListener('click', () => { window.location.href = `chat.html?user=${el.dataset.user}`; }));
    }
    renderDropdowns();
    document.getElementById('viewAllNotificationsLink').addEventListener('click', e => { e.preventDefault(); window.location.href = 'chat.html'; });
    document.getElementById('viewAllMessagesLink').addEventListener('click', e => { e.preventDefault(); window.location.href = 'chat.html'; });

    function closeAllDropdowns() { notifDropdown.classList.remove('show'); msgDropdown.classList.remove('show'); activeDropdown = null; }
    function openDropdown(type, icon) {
      closeAllDropdowns();
      const dd = type === 'notification' ? notifDropdown : msgDropdown;
      const rect = icon.getBoundingClientRect();
      dd.style.top = (rect.bottom + window.scrollY + 5) + 'px';
      dd.style.right = (window.innerWidth - rect.right - window.scrollX) + 'px';
      dd.classList.add('show');
      activeDropdown = type;
    }
    document.getElementById('notificationBell').addEventListener('click', e => { e.stopPropagation(); activeDropdown === 'notification' ? closeAllDropdowns() : openDropdown('notification', e.currentTarget); });
    document.getElementById('messageIcon').addEventListener('click', e => { e.stopPropagation(); activeDropdown === 'message' ? closeAllDropdowns() : openDropdown('message', e.currentTarget); });
    document.addEventListener('click', e => { if (!e.target.closest('.notification-wrapper') && !e.target.closest('.notification-dropdown') && !e.target.closest('.message-wrapper') && !e.target.closest('.message-dropdown')) closeAllDropdowns(); });

    // ---------- Profile Dropdown ----------
    const profileBadge = document.getElementById('profileBadge');
    const profileMenu = document.getElementById('profileMenu');
    profileBadge.addEventListener('click', e => { e.stopPropagation(); profileMenu.classList.toggle('show'); });
    document.addEventListener('click', e => { if (!profileBadge.contains(e.target) && !profileMenu.contains(e.target)) profileMenu.classList.remove('show'); });

    // Bottom nav
    document.querySelectorAll('.bottom-nav-item').forEach(item => item.addEventListener('click', function() { document.querySelectorAll('.bottom-nav-item').forEach(i => i.classList.remove('active')); this.classList.add('active'); }));

    // Chatbot
    (function(){
      const chatIcon = document.getElementById('chatIcon');
      const chatBox = document.getElementById('chatBox');
      document.getElementById('chatLabel').addEventListener('click', ()=> chatBox.classList.toggle('show'));
      chatIcon.addEventListener('click', ()=> chatBox.classList.toggle('show'));
      document.getElementById('closeChatBtn').addEventListener('click', ()=> chatBox.classList.remove('show'));
      const sendBtn = document.getElementById('sendChat');
      const chatInput = document.getElementById('chatInput');
      const chatMessages = document.getElementById('chatMessages');
      sendBtn.addEventListener('click', ()=>{
        const m = chatInput.value.trim(); if(!m) return;
        const div = document.createElement('div'); div.className = 'chat-message'; div.textContent = m;
        chatMessages.appendChild(div); chatInput.value = '';
        setTimeout(()=>{ const botDiv = document.createElement('div'); botDiv.className = 'chat-message bot'; botDiv.textContent = 'Thanks! 🔥'; chatMessages.appendChild(botDiv); }, 500);
      });
    })();

    renderProfileUI();
  })();
</script>
</body>
</html>
